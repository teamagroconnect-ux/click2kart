<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Click2Kart - India's Premier B2B Electronics Wholesale Marketplace</title>

  <!-- SEO Description -->
  <meta name="description" content="Buy electronics wholesale across India with GST billing, secure payments, logistics support and trusted B2B suppliers on Click2Kart." />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://click2kart.net/" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#7c3aed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Click2Kart" />
  <link rel="apple-touch-icon" href="/app-icon.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/app-icon.png">

  <!-- Open Graph Tags -->
  <meta property="og:title" content="Click2Kart - India's Premier B2B Electronics Wholesale Marketplace" />
  <meta property="og:description" content="Buy electronics wholesale across India with GST billing, secure payments, logistics support and trusted B2B suppliers on Click2Kart." />
  <meta property="og:image" content="https://click2kart.net/logo.png" />
  <meta property="og:url" content="https://click2kart.net" />
  <meta property="og:type" content="website" />

  <!-- Organization Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Click2Kart",
    "url": "https://click2kart.net",
    "logo": "https://click2kart.net/logo.png"
  }
  </script>

  <!-- Website Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "url": "https://click2kart.net",
    "name": "Click2Kart",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://click2kart.net/products?search={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
